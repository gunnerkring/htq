name: Free Release

on:
  workflow_dispatch:
  push:
    tags:
      - "free-v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck and build
        run: npm run build

  macos-universal-unsigned:
    needs: verify
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned macOS universal artifacts
        run: npm run release:free:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-unsigned
          path: |
            release/*.dmg
            release/*.zip

      - name: Publish macOS artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/free-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip

  windows-unsigned:
    needs: verify
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Windows artifacts
        run: npm run release:free:windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned
          path: |
            release/*.exe

      - name: Publish Windows artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/free-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
